<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🎯 西のくじ引き 🎯</title>

<style>

body{
text-align:center;
font-family:sans-serif;
background:#fffae6;
margin:0;
padding:50px 20px;
}

h1{
font-size:32px;
margin-bottom:30px;
color:#d60000;
}

#modeBtn{
margin-bottom:40px;
font-size:20px;
padding:10px 20px;
border-radius:10px;
border:2px solid #333;
background:#fff;
cursor:pointer;
}

.button-grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
max-width:400px;
margin:auto;
}

.button-grid button{
width:100px;
height:100px;
font-size:28px;
cursor:pointer;
border-radius:12px;
border:3px solid #333;
background:#fff;
transition:0.2s;
}

.button-grid button:disabled{
opacity:0.6;
cursor:default;
}

#message{
margin-top:25px;
font-size:26px;
font-weight:bold;
}

#resetBtn{
margin-top:25px;
font-size:20px;
padding:10px 20px;
border-radius:10px;
border:2px solid #333;
background:#fff;
cursor:pointer;
}

</style>

</head>

<body>

<h1>🎯 西のくじ引き 🎯</h1>

<div id="message">モードを選んでね</div>

<button id="modeBtn" onclick="switchMode()">モード切替</button>

<div class="button-grid">
<button onclick="scratch(this)">❔</button>
<button onclick="scratch(this)">❔</button>
<button onclick="scratch(this)">❔</button>
<button onclick="scratch(this)">❔</button>
<button onclick="scratch(this)">❔</button>
<button onclick="scratch(this)">❔</button>
</div>


<button id="resetBtn" onclick="resetGame()">シャッフルやり直し</button>

<script>

let buttons=document.querySelectorAll(".button-grid button");

let mode=0;
let gameOver=false;

let winnerIndex=0;
let numbers=[];
let persons=[];

const names=[
"田中",
"内田",
"井上",
"谷井",
"大平",
"和田"
];

function scratch(btn){

if(gameOver)return;

let index=Array.from(buttons).indexOf(btn);

if(mode===0){

if(index===winnerIndex){

btn.innerText="🎉";
btn.style.background="#ffe066";

document.getElementById("message").innerText="🎉 当たり！";

gameOver=true;
disableAll();

}else{

btn.innerText="×";
btn.style.background="#ccc";
btn.disabled=true;

document.getElementById("message").innerText="残念…";

}

}

else if(mode===1){

btn.innerText=numbers[index];
btn.style.background="#fff0f0";
btn.disabled=true;

document.getElementById("message").innerText=
"あなたは "+numbers[index]+"です";

if(Array.from(buttons).every(b=>b.disabled)){
gameOver=true;
}

}

else if(mode===2){

startRoulette();

}

}

function startRoulette(){

persons=shuffle(names);

buttons.forEach((b,i)=>{
b.innerText=persons[i];
b.style.background="#fff";
});

let index=0;
let count=0;

let timer=setInterval(()=>{

buttons.forEach(b=>b.style.background="#fff");

buttons[index].style.background="#ffe066";

index++;
if(index>=buttons.length)index=0;

count++;

if(count>25){

clearInterval(timer);

let winner=Math.floor(Math.random()*buttons.length);

buttons.forEach(b=>b.style.background="#fff");

buttons[winner].style.background="#ff9999";

document.getElementById("message").innerText=
"当たりは "+persons[winner]+"さん";

gameOver=true;

}

},100);

}

function disableAll(){
buttons.forEach(b=>b.disabled=true);
}

function switchMode(){

mode++;

if(mode>2)mode=0;

resetGame();

}

function resetGame(){

gameOver=false;

winnerIndex=Math.floor(Math.random()*buttons.length);

numbers=shuffle([1,2,3,4,5,6]);

persons=shuffle(names);

buttons.forEach(b=>{
b.innerText="❔";
b.style.background="#fff";
b.disabled=false;
});

document.getElementById("message").innerText="モードを選んでね";

updateModeText();

}

function updateModeText(){

if(mode===0){
document.getElementById("modeBtn").innerText=
"モード切替（スクラッチ）";
}

if(mode===1){
document.getElementById("modeBtn").innerText=
"モード切替（数字を決めます）";
}

if(mode===2){
document.getElementById("modeBtn").innerText=
"モード切替（ルーレット）";
}

}

function shuffle(array){

let arr=array.slice();

for(let i=arr.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1));

[arr[i],arr[j]]=[arr[j],arr[i]];

}

return arr;

}

resetGame();

</script>

</body>
</html>
